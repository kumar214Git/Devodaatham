<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Event Payment</title>
<style>
body{margin:0;background:#f3f5f7;font-family:Arial,sans-serif}
.card{max-width:420px;margin:24px auto;background:#fff;padding:24px;border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);text-align:center}
.qr{width:300px;max-width:90%;display:block;margin:20px auto;cursor:pointer;}
.green{display:block;background:#16a34a;color:#fff;text-decoration:none;
padding:16px;border-radius:12px;font-weight:bold;font-size:18px;margin:20px 0}
button{padding:12px 16px;border-radius:10px;border:1px solid #bbb;background:#fff;cursor:pointer}
.small{color:#666;font-size:14px}
</style>
</head>
<body>
<div class="card">
<h1>ദേവോദാത്തം</h1>
<p>ശ്രീ കോട്ടയ്ക്കൽ ദേവദാസൻ്റെ ഷഷ്ടിപൂർത്തിയാഘോഷം</p>
<img src="DevodaathamBankQR.png" onclick="pay()" alt="QR Code" class="qr">
<p><strong>VINOD KUMAR C</strong><br>
<span class="small">qr919539728323-2553@unionbankofindia</span></p>
<a href="#" class="green" onclick="pay();return false;">🟢 PAY NOW</a>
<button onclick="copyUPI()">Copy UPI ID</button>
<p class="small">Enter the amount in your preferred UPI app and complete the payment.</p>
</div>
<script>
const upi="upi://pay?pa=qr919539728323-2553@unionbankofindia";
function pay(){window.location.href=upi;}
function copyUPI(){
navigator.clipboard.writeText("qr919539728323-2553@unionbankofindia");
alert("UPI ID copied.");
}
setTimeout(pay,700);
</script>
</body>
</html>
