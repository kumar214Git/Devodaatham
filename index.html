<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay Vinod Kumar C</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1a2a6c, #2c5364);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 36px 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .event-title {
    font-size: 26px;
    font-weight: 700;
    color: #1a2a6c;
    margin-bottom: 8px;
  }
  .event-subtitle {
    font-size: 14px;
    color: #555;
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .qr-img {
    width: 100%;
    max-width: 260px;
    height: auto;
    margin: 0 auto 18px;
    display: block;
    border-radius: 8px;
  }
  .name {
    font-size: 17px;
    color: #333;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .vpa {
    font-size: 13px;
    color: #777;
    margin-bottom: 24px;
    word-break: break-all;
  }
  .btn {
    display: block;
    background: #1a2a6c;
    color: #fff;
    text-decoration: none;
    padding: 15px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .btn:active { opacity: 0.85; }
  .note {
    font-size: 12px;
    color: #999;
    line-height: 1.5;
  }
  .status {
    font-size: 13px;
    color: #2c5364;
    margin-bottom: 14px;
    min-height: 18px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="event-title">ദേവോദാത്തം</div>
    <div class="event-subtitle">ശ്രീ കോട്ടയ്ക്കൽ ദേവദാസന്റെ<br>ഷഷ്ഠിപൂർത്തിയാഘോഷം</div>
    <img class="qr-img" src="DevodaathamBankQR.png" alt="UPI QR Code">
    <div class="name">VINOD KUMAR C</div>
    <div class="vpa">QR919539728323-2553@unionbankofindia</div>
    <div class="status" id="status">Opening your UPI app…</div>
    <a class="btn" id="payBtn" href="upi://pay?pa=QR919539728323-2553@unionbankofindia&pn=VINOD%20KUMAR%20C&cu=INR&tr=FINACLE_QRCODE&mc=0000&mode=02&purpose=00&sign=MEUCIDJr69TMnhMzoSrFbXC7k0uEzPjBikAxBl/1/0R8k2qkAiEA913yFW94N8wbOWlhRr7wkT6uqv1aAf0yvx5+YLE69LU=">
      Open UPI App to Pay
    </a>
    <div class="note">
      Tap the button above if your UPI app didn't open automatically.
      You'll be able to enter the amount inside your app.
    </div>
  </div>

  <script>
    var upiLink = "upi://pay?pa=QR919539728323-2553@unionbankofindia&pn=VINOD%20KUMAR%20C&cu=INR&tr=FINACLE_QRCODE&mc=0000&mode=02&purpose=00&sign=MEUCIDJr69TMnhMzoSrFbXC7k0uEzPjBikAxBl/1/0R8k2qkAiEA913yFW94N8wbOWlhRr7wkT6uqv1aAf0yvx5+YLE69LU=";
    // Try auto-redirect on page load (works best on mobile)
    window.onload = function() {
      setTimeout(function() {
        window.location.href = upiLink;
      }, 400);
    };
  </script>
</body>
</html>
